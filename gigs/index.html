<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gig calendar - Anthemic Developments</title>
  <meta name="description" content="Upcoming and past gigs." />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&display=swap" rel="stylesheet" />

  <style>
    html {
      color-scheme: dark;
      --bg: #0e1015;
      --bg-card: #161b24;
      --bg-card-hover: #1c2330;
      --fg: #eceef4;
      --fg-dim: #949db0;
      --accent: #c9a227;
      --mml-blue: #6b9cff;
      --border: #2a3140;
      --border-strong: #3d4659;
      --accent-live: var(--mml-blue);
      --accent-live-soft: rgba(107, 156, 255, 0.14);
      --card-live-border: rgba(107, 156, 255, 0.35);
      --card-live-title: #f2f5fc;
      --badge-live-fg: #b8d4ff;
      --badge-live-border: rgba(107, 156, 255, 0.42);
      --badge-accent-border: rgba(201, 162, 39, 0.38);
      --badge-past-bg: rgba(90, 99, 119, 0.12);
      --badge-past-fg: #a8b0c4;
      --badge-past-border: rgba(90, 99, 119, 0.35);
      --font-display: "Fraunces", Georgia, "Times New Roman", serif;
      --font-body: "Figtree", ui-sans-serif, system-ui, sans-serif;
      --font-ui: "Figtree", ui-sans-serif, system-ui, sans-serif;
      --theme-chip-bg: rgba(255, 255, 255, 0.06);
      --theme-chip-border: var(--border);
      --theme-chip-active-bg: rgba(107, 156, 255, 0.18);
      --theme-chip-active-fg: #e8eeff;
    }
    html[data-theme="light"] {
      color-scheme: light;
      --bg: #f4f6fb;
      --bg-card: #ffffff;
      --bg-card-hover: #e8ecf6;
      --fg: #141820;
      --fg-dim: #5a6377;
      --accent: #9a7416;
      --mml-blue: #2563eb;
      --border: #d5dbe8;
      --border-strong: #b8c2d4;
      --accent-live: #2563eb;
      --accent-live-soft: rgba(37, 99, 235, 0.1);
      --card-live-border: rgba(37, 99, 235, 0.35);
      --card-live-title: #0f172a;
      --badge-live-fg: #1e40af;
      --badge-live-border: rgba(37, 99, 235, 0.35);
      --badge-accent-border: rgba(154, 116, 22, 0.35);
      --badge-past-bg: rgba(90, 99, 119, 0.1);
      --badge-past-fg: #4b5568;
      --badge-past-border: rgba(90, 99, 119, 0.25);
      --theme-chip-bg: rgba(255, 255, 255, 0.7);
      --theme-chip-active-bg: rgba(37, 99, 235, 0.15);
      --theme-chip-active-fg: #0f172a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(165deg, rgba(107, 156, 255, 0.06) 0%, transparent 42%),
        linear-gradient(158deg, rgba(201, 162, 39, 0.04) 0%, transparent 36%),
        repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(236, 238, 244, 0.022) 27px, rgba(236, 238, 244, 0.022) 28px);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
      min-height: 100vh;
    }
    html[data-theme="light"] body {
      background-image:
        linear-gradient(165deg, rgba(37, 99, 235, 0.06) 0%, transparent 42%),
        linear-gradient(158deg, rgba(154, 116, 22, 0.05) 0%, transparent 36%),
        repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(20, 24, 32, 0.06) 27px, rgba(20, 24, 32, 0.06) 28px);
    }
    .wrap { width: 100%; max-width: 720px; margin: 0 auto; padding: 0 28px 48px; }
    .header-top {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 28px 0;
      max-width: 1120px;
      margin: 0 auto;
    }
    .theme-group {
      display: inline-flex;
      border: 1px solid var(--theme-chip-border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--theme-chip-bg);
    }
    .theme-btn {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 8px 14px;
      margin: 0;
      border: none;
      background: transparent;
      color: var(--fg-dim);
      cursor: pointer;
    }
    .theme-btn[aria-pressed="true"] {
      background: var(--theme-chip-active-bg);
      color: var(--theme-chip-active-fg);
    }
    .theme-btn + .theme-btn { border-left: 1px solid var(--theme-chip-border); }
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .nav-row a {
      color: var(--fg-dim);
      text-decoration: none;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
    }
    .nav-row a:hover { color: var(--fg); }
    .nav-row .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      justify-content: flex-end;
    }
    .nav-row .tools a { color: var(--accent-live); }
    h1 {
      margin: 0 0 10px;
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 3.5vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    .lede {
      margin: 0 0 24px;
      color: var(--fg-dim);
      font-size: 1.02rem;
    }
    .section-heading {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin: 32px 0 14px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg-dim);
    }
    .section-heading:first-of-type { margin-top: 8px; }
    .section-heading .sec-num { font-weight: 400; color: var(--accent); font-variant-numeric: tabular-nums; }
    .section-heading .sec-title { color: var(--fg); }
    .gig-list { display: flex; flex-direction: column; gap: 12px; }
    .gig-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px 20px 16px 8px;
      padding: 18px 20px 20px;
      transition: background 140ms ease, border-color 140ms ease;
    }
    .gig-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-strong);
    }
    .gig-card--upcoming {
      border-color: var(--card-live-border);
      box-shadow: inset 0 3px 0 0 var(--accent-live);
    }
    .gig-poster {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      object-position: center top;
      border-radius: 4px 16px 4px 4px;
      display: block;
      margin-bottom: 14px;
    }
    .gig-card--has-poster { padding-top: 14px; }
    .gig-card .row-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 8px;
    }
    .badge {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 4px;
    }
    .badge.upcoming {
      background: var(--accent-live-soft);
      color: var(--badge-live-fg);
      border: 1px solid var(--badge-live-border);
    }
    .badge.past {
      background: var(--badge-past-bg);
      color: var(--badge-past-fg);
      border: 1px solid var(--badge-past-border);
    }
    .badge.free {
      background: rgba(201, 162, 39, 0.12);
      color: var(--accent);
      border: 1px solid var(--badge-accent-border);
    }
    .gig-price {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .gig-date {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      color: var(--fg-dim);
    }
    .gig-title {
      margin: 0 0 6px;
      font-family: var(--font-ui);
      font-size: 1.12rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--card-live-title);
    }
    .gig-card:not(.gig-card--upcoming) .gig-title { color: var(--fg); }
    .gig-desc {
      margin: 0 0 8px;
      color: var(--fg-dim);
      font-size: 0.92rem;
      line-height: 1.55;
    }
    .gig-meta {
      margin: 0;
      color: var(--fg-dim);
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .gig-meta strong { color: var(--fg); font-weight: 500; }
    .gig-actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      align-items: center;
    }
    .gig-actions a {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-live);
      text-decoration: none;
      white-space: nowrap;
    }
    .gig-actions a:hover { text-decoration: underline; text-underline-offset: 3px; }
    .empty {
      margin: 0;
      padding: 18px 16px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--fg-dim);
      font-size: 0.95rem;
      text-align: center;
    }
    .load-err {
      padding: 16px 18px;
      border-radius: 12px;
      border: 1px solid var(--border-strong);
      background: var(--bg-card);
      color: var(--fg);
    }
    .cal-wrap {
      margin-bottom: 32px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 20px 16px;
      user-select: none;
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .cal-nav {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg-dim);
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1;
      padding: 6px 12px;
    }
    .cal-nav:hover { border-color: var(--border-strong); color: var(--fg); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-dow {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-dim);
      text-align: center;
      padding-bottom: 8px;
    }
    .cal-day {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      border-radius: 7px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      position: relative;
    }
    .cal-day--today {
      background: rgba(201, 162, 39, 0.12);
      color: var(--accent);
      font-weight: 700;
    }
    .cal-day--has-gig {
      background: var(--accent-live-soft);
      color: var(--accent-live);
      font-weight: 700;
      cursor: pointer;
    }
    .cal-day--has-gig:hover,
    .cal-day--has-gig:focus-visible {
      background: rgba(107, 156, 255, 0.22);
      outline: 2px solid var(--accent-live);
      outline-offset: 1px;
    }
    .cal-day--today.cal-day--has-gig {
      background: var(--accent-live-soft);
      color: var(--accent-live);
    }
    .cal-day--has-gig::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7;
    }
    html[data-theme="light"] .cal-day--today {
      background: rgba(154, 116, 22, 0.1);
    }
  </style>
  <script src="/assets/js/theme-init.js"></script>

<body>
  <div class="header-top">
    <div class="theme-group" role="group" aria-label="Colour theme">
      <button type="button" class="theme-btn" id="theme-dark" aria-pressed="false">Dark</button>
      <button type="button" class="theme-btn" id="theme-light" aria-pressed="false">Light</button>
    </div>
  </div>

  <div class="wrap">
    <div class="nav-row">
      <a href="../index.html">← Hub</a>
      <div class="tools">
        <a href="/setlist/">Set List Generator</a>
        <a href="/bass/">Bass coaching</a>
      </div>
    </div>

    <h1>Gig calendar</h1>
    <p class="lede">Upcoming first, then past dates.</p>

    <div id="gig-calendar" class="cal-wrap" hidden></div>

    <p id="load-err" class="load-err" hidden></p>

    <h2 class="section-heading"><span class="sec-num" aria-hidden="true">01</span> <span class="sec-title">Upcoming</span></h2>
    <div id="gigs-upcoming" class="gig-list" aria-live="polite"></div>

    <h2 class="section-heading"><span class="sec-num" aria-hidden="true">02</span> <span class="sec-title">Past</span></h2>
    <div id="gigs-past" class="gig-list" aria-live="polite"></div>
  </div>

  <script defer src="/assets/js/gigs.js"></script>

</html>
