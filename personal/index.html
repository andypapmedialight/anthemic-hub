<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal · Anthemic Developments</title>
  <meta name="description" content="Personal pages on Anthemic — writing and notes." />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&display=swap" rel="stylesheet" />
  <style>
    html { color-scheme: dark; --bg: #0e1015; --fg: #eceef4; --fg-dim: #949db0; --accent: #c9a227; --live: #6b9cff; --border: #2a3140; --font-d: "Fraunces", Georgia, serif; --font-b: "Figtree", ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: var(--font-b); font-size: 16px; line-height: 1.55; color: var(--fg); background: var(--bg); padding: 40px 20px 48px; }
    .wrap { max-width: 40rem; margin: 0 auto; }
    h1 { font-family: var(--font-d); font-size: 1.75rem; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 8px; color: var(--accent); }
    p { margin: 0 0 20px; color: var(--fg-dim); }
    ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 12px; }
    li a {
      display: block; padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border);
      color: var(--live); font-weight: 600; text-decoration: none;
    }
    li a:hover { border-color: #3d4659; color: var(--fg); }
    .back { margin-top: 28px; font-size: 0.9rem; }
    .back a { color: var(--fg-dim); }
    .back a:hover { color: var(--live); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Personal</h1>
    <p>Corner of the site for non-workshop voice — long-form and scraps. For now only the writing holding page is wired.</p>
    <ul>
      <li><a href="/personal/writing/">Writing — coming soon</a></li>
    </ul>
    <p class="back"><a href="/">← Anthemic hub</a></p>
  </div>
</body>
</html>
