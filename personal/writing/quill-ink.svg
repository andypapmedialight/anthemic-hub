<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Quill and ink</title>
  <desc id="desc">Stylised feather quill, ink bottle, and parchment for a writing holding page.</desc>
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8dcc8"/>
      <stop offset="55%" stop-color="#d4c4a8"/>
      <stop offset="100%" stop-color="#c4b08a"/>
    </linearGradient>
    <linearGradient id="feather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2f4f8"/>
      <stop offset="45%" stop-color="#c9d4e8"/>
      <stop offset="100%" stop-color="#8fa3c4"/>
    </linearGradient>
    <linearGradient id="inkglass" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="70%" stop-color="#1a2844"/>
      <stop offset="100%" stop-color="#2a4060"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- parchment -->
  <path fill="url(#parchment)" d="M120 80h520c16 0 28 12 28 28v400c0 16-12 28-28 28H120c-16 0-28-12-28-28V108c0-16 12-28 28-28z" opacity="0.92"/>
  <path fill="none" stroke="#a09078" stroke-width="1.2" d="M132 96h496M132 128h420M132 160h460" opacity="0.5"/>
  <!-- ink blot -->
  <ellipse cx="520" cy="420" rx="72" ry="48" fill="#0a1020" opacity="0.35" filter="url(#soft)"/>
  <!-- ink bottle -->
  <path fill="#1a2233" d="M540 380h48v8h-48v-8zm6-120h36l8 108H538l8-108z"/>
  <path fill="url(#inkglass)" d="M528 268h72c8 0 14 6 14 14v178c0 10-8 18-18 18H532c-10 0-18-8-18-18V282c0-8 6-14 14-14z"/>
  <ellipse cx="564" cy="278" rx="34" ry="10" fill="#3a5080" opacity="0.6"/>
  <rect x="548" y="300" width="32" height="120" rx="4" fill="#060a14" opacity="0.85"/>
  <!-- quill shaft -->
  <path fill="#6b5344" d="M280 120l220 280-14 10L266 130z" opacity="0.95"/>
  <!-- feather -->
  <path fill="url(#feather)" filter="url(#soft)" d="M260 100c80-20 160 40 200 120 36 72 40 160 20 240l-18-6c18-76 14-156-18-220-36-76-108-128-184-134z"/>
  <path fill="none" stroke="#7a8aaa" stroke-width="1.2" opacity="0.45" d="M300 118c60 24 110 80 138 150M320 108c52 32 96 90 118 168"/>
  <!-- nib -->
  <path fill="#2a2018" d="M266 128l16 22-8 6-14-20z"/>
  <path fill="#c9a227" opacity="0.35" d="M500 400l24 18-6 8-26-16z"/>
</svg>
