<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Writing — coming soon · Anthemic</title>
  <meta name="description" content="Personal writing — coming soon. A quiet corner of Anthemic Developments." />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link rel="preload" href="quill-ink.svg" as="image" />
  <link href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&display=swap" rel="stylesheet" />
  <style>
    html {
      color-scheme: dark;
      --bg: #0e1015;
      --bg-ink: #0a0c12;
      --fg: #eceef4;
      --fg-dim: #949db0;
      --accent: #c9a227;
      --accent-live: #6b9cff;
      --border: #2a3140;
      --ink: #1a2233;
      --ink-bright: rgba(107, 156, 255, 0.35);
      --font-display: "Fraunces", Georgia, serif;
      --font-body: "Figtree", ui-sans-serif, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
      color: var(--fg);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(107, 156, 255, 0.08), transparent 50%),
        radial-gradient(ellipse 80% 50% at 80% 100%, rgba(201, 162, 39, 0.06), transparent 45%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 48px;
    }
    .wrap {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }
    .paper {
      position: relative;
      width: min(92vw, 420px);
      margin: 0 auto 28px;
      padding: 22px 20px 30px;
      border-radius: 4px 18px 14px 6px;
      border: 1px solid var(--border);
      background: linear-gradient(165deg, rgba(22, 27, 36, 0.96), rgba(14, 16, 21, 0.98));
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.04) inset,
        0 24px 48px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }
    .paper::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 26px,
        rgba(236, 238, 244, 0.03) 26px,
        rgba(236, 238, 244, 0.03) 27px
      );
      pointer-events: none;
    }
    .ink-blot {
      position: absolute;
      width: 140px;
      height: 100px;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%) scale(0.35);
      border-radius: 52% 48% 45% 55% / 48% 52% 55% 45%;
      background: radial-gradient(circle at 35% 35%, rgba(26, 34, 51, 0.55), transparent 58%),
        radial-gradient(circle at 62% 48%, var(--ink-bright), transparent 50%),
        radial-gradient(circle at 50% 55%, rgba(26, 34, 51, 0.75), var(--ink));
      opacity: 0;
      filter: blur(0.8px);
      pointer-events: none;
      z-index: 1;
      animation: ink-blot-spread 3s ease-out 1.1s forwards;
    }
    @keyframes ink-blot-spread {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      18% { opacity: 0.75; }
      100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.15); }
    }
    .poetry-stage {
      position: relative;
      z-index: 2;
      margin: 0 auto 6px;
      min-height: min(52vw, 240px);
      max-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0 4px;
    }
    .poetry-art-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
      transform-origin: 55% 75%;
      animation: poetry-sway 3.4s ease-in-out infinite;
      filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.42));
    }
    @keyframes poetry-sway {
      0%, 100% { transform: rotate(-2.5deg) translate(0, 0); }
      22% { transform: rotate(3deg) translate(-3px, 4px); }
      48% { transform: rotate(-1deg) translate(2px, 6px); }
      72% { transform: rotate(2.2deg) translate(-4px, 2px); }
    }
    .poetry-art {
      display: block;
      width: auto;
      height: auto;
      max-width: min(100%, 360px);
      max-height: min(52vw, 240px);
      object-fit: contain;
      border-radius: 6px;
    }
    .poetry-ink-gleam {
      position: absolute;
      inset: -4%;
      border-radius: 8px;
      pointer-events: none;
      background: linear-gradient(
        118deg,
        transparent 40%,
        rgba(255, 255, 255, 0.07) 48%,
        rgba(107, 156, 255, 0.12) 52%,
        transparent 60%
      );
      background-size: 200% 200%;
      animation: ink-gleam 4.5s ease-in-out infinite;
      mix-blend-mode: soft-light;
    }
    @keyframes ink-gleam {
      0%, 100% { background-position: 120% 50%; opacity: 0.35; }
      50% { background-position: -20% 50%; opacity: 0.85; }
    }
    .drops {
      position: absolute;
      left: 52%;
      bottom: 10%;
      width: 4px;
      height: 64px;
      margin-left: -2px;
      z-index: 3;
      pointer-events: none;
    }
    .drop {
      position: absolute;
      left: 50%;
      width: 7px;
      height: 9px;
      margin-left: -3px;
      border-radius: 50% 50% 45% 55%;
      background: radial-gradient(circle at 30% 28%, rgba(40, 48, 64, 0.95), rgba(20, 24, 32, 0.9));
      box-shadow: 0 0 0 1px rgba(107, 156, 255, 0.15);
      opacity: 0;
      animation: ink-drop 2.6s ease-in infinite;
    }
    .drop:nth-child(1) { animation-delay: 0.35s; margin-left: -10px; }
    .drop:nth-child(2) { animation-delay: 1.05s; }
    .drop:nth-child(3) { animation-delay: 1.75s; margin-left: 6px; }
    @keyframes ink-drop {
      0% { transform: translateY(0) scale(0.35); opacity: 0; }
      14% { opacity: 0.95; }
      100% { transform: translateY(56px) scale(1); opacity: 0; }
    }
    h1 {
      position: relative;
      z-index: 2;
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: clamp(1.85rem, 5vw, 2.35rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.03em;
      color: var(--fg);
    }
    .badge {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 4px;
      background: rgba(201, 162, 39, 0.14);
      color: var(--accent);
      border: 1px solid rgba(201, 162, 39, 0.35);
    }
    .sub {
      margin: 0 0 16px;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--fg-dim);
    }
    .lede {
      margin: 0 auto 28px;
      max-width: 42ch;
      font-size: 0.95rem;
      color: var(--fg-dim);
      line-height: 1.65;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--accent-live);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .back:hover {
      color: var(--fg);
      border-bottom-color: var(--border);
    }
    .nav-links {
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 14px;
    }
    .nav-sep {
      color: var(--fg-dim);
      user-select: none;
    }
    .illustration-caption {
      margin: 0 0 12px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--fg-dim);
      opacity: 0.85;
    }
    @media (prefers-reduced-motion: reduce) {
      .poetry-art-wrap,
      .poetry-ink-gleam,
      .drop,
      .ink-blot {
        animation: none !important;
      }
      .poetry-art-wrap { transform: rotate(-1deg); }
      .poetry-ink-gleam { opacity: 0.25; }
      .drop { display: none; }
      .ink-blot {
        opacity: 0.42;
        transform: translate(-50%, -50%) scale(0.95);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="paper">
      <div class="ink-blot" aria-hidden="true"></div>
      <div class="poetry-stage" aria-hidden="true">
        <div class="drops">
          <span class="drop"></span>
          <span class="drop"></span>
          <span class="drop"></span>
        </div>
        <div class="poetry-art-wrap">
          <img
            class="poetry-art"
            src="quill-ink.svg"
            width="800"
            height="600"
            alt="Feather quill, ink bottle, and parchment"
            decoding="async"
            fetchpriority="high"
          />
          <div class="poetry-ink-gleam" aria-hidden="true"></div>
        </div>
      </div>
      <p class="illustration-caption">Quill - ink - parchment</p>
      <span class="badge">Coming soon</span>
      <h1>Writing</h1>
      <p class="sub">Essays, notes, and longer pieces.</p>
      <p class="lede">
        This corner of the site is still in the inkwell. When it goes live, you will find personal writing here — for now, wander back to the hub or explore the brain map.
      </p>
      <p class="nav-links">
        <a class="back" href="/">← Anthemic hub</a>
        <span class="nav-sep" aria-hidden="true">·</span>
        <a class="back" href="/brain/">Brain map</a>
      </p>
    </div>
  </div>
</body>
</html>
