<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Macro</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230c0e10'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='16' fill='%23fbbf24'%3E%24%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0c0e10;
    --surface:  #13171b;
    --surface2: #1a1f25;
    --border:   #252b33;
    --border2:  #2e3740;
    --text:     #e8eaed;
    --muted:    #7a8694;
    --dim:      #4a5568;
    --up:       #34d399;
    --up-dim:   #0d3326;
    --dn:       #f87171;
    --dn-dim:   #3b1111;
    --gold:     #fbbf24;
    --accent:   #3b82f6;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ───────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header-left h1 span {
    color: var(--gold);
  }

  .header-left .date-line {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--text); }
  .refresh-btn:active { transform: scale(0.97); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-line {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    text-align: right;
  }
  .status-line.ok { color: var(--up); }
  .status-line.err { color: var(--dn); }

  /* ── Section ──────────────────────────────────────────── */
  .section {
    margin-bottom: 2rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Cards Grid ───────────────────────────────────────── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.1rem 0.85rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    animation: fadeUp 0.4s ease both;
  }

  .card:hover { border-color: var(--border2); transform: translateY(-1px); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card.up  { border-bottom: 2px solid var(--up); }
  .card.dn  { border-bottom: 2px solid var(--dn); }
  .card.neu { border-bottom: 2px solid var(--border2); }

  .card-ticker {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .card-name {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.6rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-price {
    font-family: 'DM Mono', monospace;
    font-size: 1.35rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }

  .card-change {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
  }

  .pill {
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    font-size: 0.68rem;
  }
  .pill.up { background: var(--up-dim); color: var(--up); }
  .pill.dn { background: var(--dn-dim); color: var(--dn); }
  .pill.neu { background: var(--surface2); color: var(--muted); }

  .card-abs {
    color: var(--muted);
    font-size: 0.65rem;
  }

  .card-loading {
    position: absolute;
    inset: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 3px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Yield Curve Bar ──────────────────────────────────── */
  .yield-extra {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .spread-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
  }
  .spread-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 500;
  }
  .spread-pos { color: var(--up); }
  .spread-neg { color: var(--dn); }

  /* ── API Key Banner ───────────────────────────────────── */
  .api-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1c1a0d;
    border: 1px solid #4a3f10;
    border-radius: 6px;
    padding: 0.8rem 1rem;
    margin-bottom: 2rem;
    font-size: 0.78rem;
    color: #d4a200;
  }
  .api-banner input {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    background: #0c0a00;
    border: 1px solid #4a3f10;
    color: var(--gold);
    padding: 5px 10px;
    border-radius: 4px;
    width: 220px;
    outline: none;
    flex-shrink: 0;
  }
  .api-banner input:focus { border-color: var(--gold); }
  .api-banner button {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .api-banner button:hover { opacity: 0.85; }

  /* ── Footer ───────────────────────────────────────────── */
  .footer {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .footer-note {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--dim);
  }

  .market-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.open { background: var(--up); box-shadow: 0 0 6px var(--up); }
  .dot.closed { background: var(--dim); }

  /* ── Info Box ────────────────────────────────────────── */
  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .info-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.7rem 1rem;
    cursor: pointer;
    user-select: none;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .info-header:hover { color: var(--text); }
  .info-header .info-icon { color: var(--accent); font-style: normal; font-size: 0.85rem; }
  .info-chevron { margin-left: auto; font-size: 0.7rem; transition: transform 0.2s; }

  .info-body {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .info-source {
    background: var(--surface);
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .info-source-active { background: #0e1420; }

  .info-source-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .info-source-name {
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--text);
  }
  .info-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid;
    white-space: nowrap;
  }

  .info-table { border-collapse: collapse; width: 100%; }
  .info-table tr { border-bottom: 1px solid var(--border); }
  .info-table tr:last-child { border-bottom: none; }
  .info-key {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--dim);
    padding: 4px 0;
    width: 50%;
  }
  .info-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 4px 0;
    text-align: right;
  }

  .info-note {
    font-size: 0.65rem;
    color: var(--dim);
    line-height: 1.5;
    padding-top: 2px;
  }

  .info-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    align-self: flex-start;
    letter-spacing: 0.03em;
  }
  .info-btn:hover { border-color: var(--accent); color: var(--text); }
  .info-btn-active { background: var(--accent); border-color: var(--accent); color: #fff; cursor: default; }

  /* ── Section Edit Button ──────────────────────────── */
  .section-edit-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .section-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .section-edit-btn.open  { border-color: var(--accent); color: var(--accent); }

  /* ── Customize Row ────────────────────────────────── */
  .customize-row {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 0.75rem;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .sym-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.06em;
  }
  .sym-pill.on  { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.1); }
  .sym-pill.off { border-color: var(--border2); color: var(--dim); background: transparent; }
  .sym-pill.on:hover  { background: rgba(59,130,246,0.2); }
  .sym-pill.off:hover { border-color: var(--muted); color: var(--muted); }

  /* ── Responsive ───────────────────────────────────────── */
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-right { align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- ── API Key Banner ── -->
<div class="api-banner" id="api-banner">
  <span>⚡ Alpha Vantage API Key:</span>
  <input type="text" id="api-key-input" placeholder="Paste your key here…" spellcheck="false">
  <button onclick="saveKey()">Save &amp; Load</button>
</div>

<!-- ── Info Box ── -->
<div class="info-box">
  <div class="info-header" onclick="toggleInfo()">
    <span class="info-icon">ⓘ</span>
    Data Sources &amp; API Options
    <span class="info-chevron" id="info-chevron">▾</span>
  </div>
  <div class="info-body" id="info-body"></div>
</div>

<!-- ── Header ── -->
<div class="header">
  <div class="header-left">
    <h1>Morning <span>Macro</span></h1>
    <div class="date-line" id="date-line">–</div>
  </div>
  <div class="header-right">
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll(true)">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Refresh
    </button>
    <div class="status-line" id="status-line">Not loaded</div>
  </div>
</div>

<!-- ── Equities ── -->
<div class="section">
  <div class="section-header">
    <span class="section-label">Equities</span>
    <div class="section-line"></div>
    <button class="section-edit-btn" id="edit-eq" onclick="toggleCustomize('eq')">⊞ Edit</button>
  </div>
  <div class="customize-row" id="cust-eq"></div>
  <div class="cards" id="equities-grid"></div>
</div>

<!-- ── Commodities ── -->
<div class="section">
  <div class="section-header">
    <span class="section-label">Commodities</span>
    <div class="section-line"></div>
    <button class="section-edit-btn" id="edit-comm" onclick="toggleCustomize('comm')">⊞ Edit</button>
  </div>
  <div class="customize-row" id="cust-comm"></div>
  <div class="cards" id="commodities-grid"></div>
</div>

<!-- ── US Treasuries ── -->
<div class="section">
  <div class="section-header">
    <span class="section-label">US Treasuries</span>
    <div class="section-line"></div>
    <button class="section-edit-btn" id="edit-bond" onclick="toggleCustomize('bond')">⊞ Edit</button>
  </div>
  <div class="customize-row" id="cust-bond"></div>
  <div class="cards" id="bonds-grid"></div>
</div>

<!-- ── Currencies ── -->
<div class="section">
  <div class="section-header">
    <span class="section-label">Currencies</span>
    <div class="section-line"></div>
    <button class="section-edit-btn" id="edit-fx" onclick="toggleCustomize('fx')">⊞ Edit</button>
  </div>
  <div class="customize-row" id="cust-fx"></div>
  <div class="cards" id="fx-grid"></div>
</div>

<!-- ── Crypto ── -->
<div class="section">
  <div class="section-header">
    <span class="section-label">Crypto</span>
    <div class="section-line"></div>
    <button class="section-edit-btn" id="edit-crypto" onclick="toggleCustomize('crypto')">⊞ Edit</button>
  </div>
  <div class="customize-row" id="cust-crypto"></div>
  <div class="cards" id="crypto-grid"></div>
</div>

<!-- ── Footer ── -->
<div class="footer">
  <span class="footer-note"><a href="/" style="color:var(--muted);text-decoration:none">← Anthemic hub</a> · Data: Alpha Vantage · FRED (St. Louis Fed) · Prices are delayed</span>
  <span class="footer-note" id="api-usage" style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--dim)"></span>
  <div class="market-status" id="market-status">
    <div class="dot closed" id="mkt-dot"></div>
    <span id="mkt-label">–</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────
let AV_KEY = 'YOUR_API_KEY_HERE';

// ── Cache (5-min TTL) ─────────────────────────────
const CACHE_TTL = 5 * 60 * 1000;
function cacheGet(key) {
  try {
    const raw = localStorage.getItem(`mmd:${key}`);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    return (Date.now() - ts < CACHE_TTL) ? data : null;
  } catch { return null; }
}
function cacheSet(key, data) {
  try { localStorage.setItem(`mmd:${key}`, JSON.stringify({ ts: Date.now(), data })); } catch {}
}

// ── Provider ──────────────────────────────────────
let activeProvider = localStorage.getItem('mmd:provider') || 'yahoo';
function setProvider(p) {
  activeProvider = p;
  localStorage.setItem('mmd:provider', p);
  renderInfoBox();
  updateApiUsageDisplay();
  const avNeedsKey = p === 'alphavantage' && AV_KEY === 'YOUR_API_KEY_HERE';
  document.getElementById('api-banner').style.display = avNeedsKey ? 'flex' : 'none';
  loadAll(true);
}

// ── Visibility ────────────────────────────────────
let VIS = {};
function loadVIS() { try { VIS = JSON.parse(localStorage.getItem('mmd:vis') || '{}'); } catch { VIS = {}; } }
function saveVIS() { try { localStorage.setItem('mmd:vis', JSON.stringify(VIS)); } catch {} }
function itemKey(item) {
  if (item.id)   return item.id;
  if (item.from) return `${item.from}${item.to}`;
  return item.sym;
}
function isOn(item) { const k = itemKey(item); return k in VIS ? VIS[k] : item.def; }
function visOf(items) { return items.filter(isOn); }

// ── Data Store ────────────────────────────────────
const DATA = {};  // itemKey → { price, change, pct }

// ── Symbol Config ─────────────────────────────────
const EQUITIES = [
  { sym: 'SPY',    label: 'S&P 500',        ticker: 'SPY',    def: true  },
  { sym: 'QQQ',    label: 'NASDAQ 100',     ticker: 'QQQ',    def: true  },
  { sym: 'DIA',    label: 'Dow Jones',      ticker: 'DIA',    def: true  },
  { sym: 'IWM',    label: 'Russell 2000',   ticker: 'IWM',    def: true  },
  { sym: 'STW.AX', label: 'ASX 200',        ticker: 'STW.AX', def: true  },
  { sym: 'EEM',    label: 'Emerg. Markets', ticker: 'EEM',    def: false },
  { sym: 'VGK',    label: 'Europe',         ticker: 'VGK',    def: false },
  { sym: 'EWJ',    label: 'Japan',          ticker: 'EWJ',    def: false },
  { sym: 'VIXY',   label: 'VIX (Proxy)',    ticker: 'VIXY',   def: false },
  { sym: 'ARKK',   label: 'ARK Innov.',     ticker: 'ARKK',   def: false },
];

const COMMODITIES = [
  { sym: 'GLD',  label: 'Gold',        ticker: 'GLD',  def: true  },
  { sym: 'SLV',  label: 'Silver',      ticker: 'SLV',  def: true  },
  { sym: 'USO',  label: 'Oil (WTI)',   ticker: 'USO',  def: true  },
  { sym: 'UNG',  label: 'Natural Gas', ticker: 'UNG',  def: true  },
  { sym: 'CPER', label: 'Copper',      ticker: 'CPER', def: false },
  { sym: 'WEAT', label: 'Wheat',       ticker: 'WEAT', def: false },
  { sym: 'CORN', label: 'Corn',        ticker: 'CORN', def: false },
];

const FX_PAIRS = [
  { from: 'AUD', to: 'USD', label: 'AUD / USD', def: true  },
  { from: 'EUR', to: 'USD', label: 'EUR / USD', def: true  },
  { from: 'GBP', to: 'USD', label: 'GBP / USD', def: true  },
  { from: 'USD', to: 'JPY', label: 'USD / JPY', def: true  },
  { from: 'USD', to: 'CAD', label: 'USD / CAD', def: false },
  { from: 'NZD', to: 'USD', label: 'NZD / USD', def: false },
  { from: 'USD', to: 'CHF', label: 'USD / CHF', def: false },
  { from: 'USD', to: 'MXN', label: 'USD / MXN', def: false },
];

// yTicker: Yahoo Finance CBOE index — used first (no CORS); null falls back to FRED
const BOND_SERIES = [
  { id: 'DGS2',   label: 'US 2Y Yield',    ticker: '2Y',  def: true,  yTicker: null   },
  { id: '^FVX',   label: 'US 5Y Yield',    ticker: '5Y',  def: false, yTicker: '^FVX' },

// ── Helpers ───────────────────────────────────────
function fmt(n, dp=2) {
  if (n === null || isNaN(n)) return '–';
  return parseFloat(n).toLocaleString('en-AU', { minimumFractionDigits: dp, maximumFractionDigits: dp });
}
function sign(n) { return n === null ? '' : n >= 0 ? '+' : ''; }
function cardClass(pct) { return pct === null ? 'neu' : pct >= 0 ? 'up' : 'dn'; }
function pillClass(pct) { return pct === null ? 'neu' : pct >= 0 ? 'up' : 'dn'; }
function pillText(pct) {
  if (pct === null) return '–';
  return `${pct >= 0 ? '▲' : '▼'} ${Math.abs(pct).toFixed(2)}%`;
}

function renderCard(data, delay=0) {
  const cls = cardClass(data.pct);
  const priceStr = data.price !== null ? data.price : '–';
  const absStr = data.change !== null ? `${sign(data.change)}${fmt(data.change)}` : '';
  return `
    <div class="card ${cls}" style="animation-delay:${delay}s">
      <div class="card-ticker">${data.ticker}</div>
      <div class="card-name">${data.label}</div>
      <div class="card-price">${priceStr}</div>
      <div class="card-change">
        <span class="pill ${pillClass(data.pct)}">${pillText(data.pct)}</span>
        ${absStr ? `<span class="card-abs">${absStr}</span>` : ''}
      </div>
      ${data.extra || ''}
    </div>`;
}

// Throttle concurrent proxied fetches
const proxyThrottle = (() => {
  let active = 0; const queue = [];
  return fn => new Promise((res, rej) => {
    const go = () => { active++; fn().then(res, rej).finally(() => { active--; queue.length && queue.shift()(); }); };
    active < 4 ? go() : queue.push(go);
  });
})();

// Same-origin CORS proxy (serve-hub.py locally, nginx /economics/proxy in prod)
let LOCAL_PROXY_PREFIX = null;

async function detectLocalProxy() {
  const candidates = [
    location.origin + '/economics/proxy?url=',
    location.origin + '/proxy?url=',
  ];
  const probe = 'https://query1.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=1d';
  for (const prefix of candidates) {
    try {
      const r = await fetch(prefix + encodeURIComponent(probe));
      if (r.ok) {
        LOCAL_PROXY_PREFIX = prefix;
        return;
      }
    } catch {}
  }
  LOCAL_PROXY_PREFIX = null;
}

function publicProxyUrls(targetUrl) {
  return [
    `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
  ];
}

async function fetchRemote(targetUrl, { asJson = true } = {}) {
  const attempts = [];

  attempts.push(async () => {
    const r = await fetch(targetUrl);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return asJson ? r.json() : r.text();
  });

  if (LOCAL_PROXY_PREFIX) {
    const proxied = LOCAL_PROXY_PREFIX + encodeURIComponent(targetUrl);
    attempts.push(async () => {
      const r = await fetch(proxied);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return asJson ? r.json() : r.text();
    });
  }

  for (const url of publicProxyUrls(targetUrl)) {
    attempts.push(async () => {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return asJson ? r.json() : r.text();
    });
  }

  attempts.push(async () => {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const wrap = await r.json();
    const body = wrap.contents;
    return asJson ? JSON.parse(body) : body;
  });

  for (const fn of attempts) {
    try {
      return await proxyThrottle(fn);
    } catch {}
  }
  return null;
}

function parseYahooChart(d) {
  if (!d?.chart?.result?.[0]) throw new Error('no data');
  const meta = d.chart.result[0].meta;
  const price = meta.regularMarketPrice;
  const prevClose = meta.chartPreviousClose ?? meta.previousClose;
  const change = prevClose != null ? price - prevClose : null;
  const pct = (change !== null && prevClose) ? (change / prevClose) * 100 : null;
  return { price, change, pct };
}

  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d`;
  try {
    const data = await fetchRemote(url, { asJson: true });
    return data ? parseYahooChart(data) : null;

  }
}

// ── Frankfurter.dev FX (CORS-friendly, no key needed) ─────────────
let _fxPromise = null;
async function loadFrankfurter(force = false) {
  const key = 'fx:frank';
  if (!force) { const c = cacheGet(key); if (c) return c; }
  if (!force && _fxPromise) return _fxPromise;
  const symbols = 'EUR,GBP,JPY,AUD,NZD,CAD,CHF,MXN,CNY,INR';
  const from = new Date(Date.now() - 4 * 86400000).toISOString().slice(0, 10);
  const to   = new Date().toISOString().slice(0, 10);
  _fxPromise = fetch(`https://api.frankfurter.dev/v1/${from}..${to}?base=USD&symbols=${symbols}`)
    .then(r => r.json())
    .then(d => {
      const dates = Object.keys(d.rates).sort();
      const result = { today: d.rates[dates[dates.length - 1]], prev: d.rates[dates[dates.length - 2]] };
      cacheSet(key, result);
      _fxPromise = null;
      return result;
    });
  return _fxPromise;
}

async function fetchFXFrank(from, to) {
  const { today, prev } = await loadFrankfurter();
  const rate = (rates, base, sym) => base === 'USD' ? rates[sym] : (1 / rates[base]);
  const price     = rate(today, from, to);
  const prevPrice = rate(prev,  from, to);
  if (!price) return null;
  const change = prevPrice ? price - prevPrice : null;
  const pct    = (change !== null && prevPrice) ? (change / prevPrice) * 100 : null;
  return { price, change, pct };
}

// ── CoinGecko crypto (CORS-friendly, no key needed) ────────────────
let _cgPromise = null;
async function loadCoinGecko(force = false) {
  const key = 'cg:batch';
  if (!force) { const c = cacheGet(key); if (c) return c; }
  if (!force && _cgPromise) return _cgPromise;
  const ids = Object.values(CG_IDS).join(',');
  _cgPromise = fetch(
    `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`
  ).then(r => r.json()).then(d => {
    const result = {};
    for (const [sym, cgId] of Object.entries(CG_IDS)) {
      const item = d[cgId];
      if (!item) continue;
      const price = item.usd;
      const pct   = item.usd_24h_change ?? null;
      const change = pct !== null ? price * pct / (100 + pct) : null;
      result[sym] = { price, change, pct };
    }
    cacheSet(key, result);
    _cgPromise = null;
    return result;
  });
  return _cgPromise;
}

async function fetchCrypto(sym, force = false) {
  try {
    const batch = await loadCoinGecko(force);
    return batch?.[sym] ?? null;
  } catch { return null; }
}

async function avQuote(sym) {
  const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${encodeURIComponent(sym)}&apikey=${AV_KEY}`;
  const r = await fetch(url);
  const d = await r.json();
  if (d.Note || d.Information) throw new Error('Rate limit');
  const q = d['Global Quote'];
  if (!q || !q['05. price']) return null;
  return {
    price: parseFloat(q['05. price']),
    change: parseFloat(q['09. change']),
    pct: parseFloat(q['10. change percent'].replace('%', '')),
  };
}

async function avFX(from, to) {
  const url = `https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=${from}&to_currency=${to}&apikey=${AV_KEY}`;
  const r = await fetch(url);
  const d = await r.json();
  if (d.Note || d.Information) throw new Error('Rate limit');
  const info = d['Realtime Currency Exchange Rate'];
  if (!info) return null;
  return { price: parseFloat(info['5. Exchange Rate']), change: null, pct: null };
}

async function fetchQuote(sym, force = false) {
  const key = `${activeProvider}:q:${sym}`;
  if (!force) { const c = cacheGet(key); if (c) return c; }
  try {
    const result = activeProvider === 'yahoo' ? await yahooChart(sym) : await avQuote(sym);
    if (result) cacheSet(key, result);
    return result;
  } catch { return null; }
}

async function fetchFX(from, to, force = false) {
  const key = `${activeProvider}:fx:${from}:${to}`;
  if (!force) { const c = cacheGet(key); if (c) return c; }
  try {
    // Yahoo mode: use Frankfurter.dev (CORS-friendly); AV mode: Alpha Vantage
    const result = activeProvider === 'yahoo'
      ? await fetchFXFrank(from, to)
      : await avFX(from, to);
    if (result) cacheSet(key, result);
    return result;
  } catch { return null; }
}

async function fetchBond(series_id, force = false) {
  const bondDef = BOND_SERIES.find(b => b.id === series_id);
  if (bondDef?.yTicker) return fetchQuote(bondDef.yTicker, force);

  const key = `b:${series_id}`;
  if (!force) { const c = cacheGet(key); if (c) return c; }
  const start = new Date(Date.now() - 30 * 24 * 3600 * 1000).toISOString().slice(0, 10);
  const fredUrl = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${series_id}&observation_start=${start}`;

  function parseCsvText(txt) {
    const lines = txt.trim().split('\n').filter(l => !l.startsWith('observation_date') && !l.endsWith(','));
    if (lines.length < 2) return null;
    const last = parseFloat(lines[lines.length - 1].split(',')[1]);
    const prev = parseFloat(lines[lines.length - 2].split(',')[1]);
    if (isNaN(last)) return null;
    const change = !isNaN(prev) ? last - prev : null;
    const pct = (change !== null && prev) ? (change / prev) * 100 : null;
    return { price: last, change, pct };
  }

  try {
    const txt = await fetchRemote(fredUrl, { asJson: false });
    const result = txt ? parseCsvText(txt) : null;
    if (result) cacheSet(key, result);
    return result;
  } catch {
    return null;
  }
}

// ── API Usage Tracker ─────────────────────────────
// Tracks calls against Alpha Vantage's free-tier limit (25/day, 500/day premium)
function trackApiCall(count = 1) {
  const today = new Date().toISOString().slice(0, 10);
  try {
    const raw = localStorage.getItem('mmd:api_usage');
    const usage = raw ? JSON.parse(raw) : { date: today, calls: 0 };
    if (usage.date !== today) { usage.date = today; usage.calls = 0; }
    usage.calls += count;
    localStorage.setItem('mmd:api_usage', JSON.stringify(usage));
    return usage.calls;
  } catch { return null; }
}

function getApiUsage() {
  const today = new Date().toISOString().slice(0, 10);
  try {
    const raw = localStorage.getItem('mmd:api_usage');
    if (!raw) return { calls: 0, remaining: 25 };
    const usage = JSON.parse(raw);
    if (usage.date !== today) return { calls: 0, remaining: 25 };
    return { calls: usage.calls, remaining: Math.max(0, 25 - usage.calls) };
  } catch { return null; }
}

function updateApiUsageDisplay() {
  const el = document.getElementById('api-usage');
  if (!el) return;
  if (activeProvider !== 'alphavantage') {
    el.textContent = 'Source: Yahoo Finance + Frankfurter (FX) + CoinGecko (Crypto) · No rate limit';
    el.style.color = 'var(--dim)';
    return;
  }
  const usage = getApiUsage();
  if (!usage) return;
  el.textContent = `AV calls today: ${usage.calls} / 25  ·  ${usage.remaining} remaining`;
  el.style.color = usage.remaining <= 5 ? 'var(--dn)' : usage.remaining <= 10 ? 'var(--gold)' : 'var(--dim)';
}

// ── Market Hours ──────────────────────────────────
function updateMarketStatus() {
  const now = new Date();
  // Use Intl to get true Eastern Time (handles DST automatically)
  const parts = Object.fromEntries(
    new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/New_York',
      weekday: 'short', hour: '2-digit', minute: '2-digit', hour12: false,
    }).formatToParts(now).map(p => [p.type, p.value])
  );
  const h = parseInt(parts.hour), m = parseInt(parts.minute);
  const day = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 }[parts.weekday] ?? -1;

  const isWeekday = day > 0 && day < 6;
  const afterOpen = h > 9 || (h === 9 && m >= 30);
  const beforeClose = h < 16;
  const open = isWeekday && afterOpen && beforeClose;

  document.getElementById('mkt-dot').className = `dot ${open ? 'open' : 'closed'}`;
  document.getElementById('mkt-label').textContent = open
    ? 'NYSE / NASDAQ: Open'
    : `NYSE / NASDAQ: Closed · Opens ${(day === 5 || day === 6 || day === 0) ? 'Monday' : 'Today'} 09:30 ET`;
}

  document.getElementById('date-line').textContent =
    now.toLocaleDateString('en-AU', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    }).toUpperCase() + '  ·  ' +
    now.toLocaleTimeString('en-AU', {
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
}

// ── Main Load ─────────────────────────────────────
async function loadAll(force = false) {
  const btn = document.getElementById('refresh-btn');
  const status = document.getElementById('status-line');
  btn.classList.add('spinning');
  status.className = 'status-line';
  status.textContent = 'Loading…';
  updateDateLine();
  updateMarketStatus();

  if (force && activeProvider === 'alphavantage') {
    trackApiCall(visOf(EQUITIES).length + visOf(COMMODITIES).length + visOf(FX_PAIRS).length);
    updateApiUsageDisplay();
  }

  // All sections in parallel; only fetches visible items
  await Promise.all(SECTIONS.map(async section => {
    const visible = visOf(section.items);
    if (!visible.length) return;
    const results = await Promise.all(visible.map(item => section.fetch(item, force)));
    visible.forEach((item, i) => { if (results[i]) DATA[itemKey(item)] = results[i]; });
    renderSectionGrid(section);
    renderCust(section);
  }));

  btn.classList.remove('spinning');
  const now = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  const eqVisible = visOf(EQUITIES);
  const allEqFailed = eqVisible.length > 0 && eqVisible.every(e => !DATA[e.sym]);
  if (allEqFailed) {
    status.className = 'status-line err';
    status.textContent = activeProvider === 'alphavantage'
      ? '⚠ AV key error or rate limit — check your key'
      : '⚠ Equities failed — allorigins.win proxy may be down, try refresh';
  } else {
    status.className = 'status-line ok';
    status.textContent = `✓ Updated ${now}`;
  }
  updateApiUsageDisplay();
}

// ── API Key Management ─────────────────────────────
function saveKey() {
  const input = document.getElementById('api-key-input');
  const key = input.value.trim();
  if (!key) return;
  AV_KEY = key;
  localStorage.setItem('av_key', key);
  document.getElementById('api-banner').style.display = 'none';
  loadAll(true);
}

async function init() {
  loadVIS();
  const saved = localStorage.getItem('av_key');
  if (saved && saved !== 'YOUR_API_KEY_HERE') {
    AV_KEY = saved;
    document.getElementById('api-key-input').value = saved;
  }
  const avNeedsKey = activeProvider === 'alphavantage' && AV_KEY === 'YOUR_API_KEY_HERE';
  document.getElementById('api-banner').style.display = avNeedsKey ? 'flex' : 'none';
  updateDateLine();
  updateMarketStatus();
  renderInfoBox();
  updateApiUsageDisplay();
  await detectLocalProxy();
  loadAll(false);
}

// Allow Enter key in API input
document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});

init();
</script>
