name: Deploy

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-anthemic-hub
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload to Droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          RSYNC_SSH="ssh -p ${DEPLOY_PORT}"
          DEST="${DEPLOY_USER}@${DEPLOY_HOST}:incoming-hub/"
          # Explicit paths: filter-style --include/--exclude often skips nested dirs like bass/ on some rsync versions.
          rsync -avz -e "${RSYNC_SSH}" ./index.html ./bass "${DEST}"
          if [[ -d assets ]]; then
            rsync -avz -e "${RSYNC_SSH}" ./assets "${DEST}"
          fi

      - name: Apply on Droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'sudo /usr/local/bin/anthemic-hub-deploy-apply.sh'

      - name: Smoke test (hub + bass files on droplet)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          code_root=$(curl -sS -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 2 "https://anthemic-developments.com/")
          [[ "${code_root}" == "200" ]] || { echo "Hub / returned HTTP ${code_root}"; exit 1; }
          curl -sS --retry 3 --retry-delay 2 "https://anthemic-developments.com/" -o /tmp/anthemic-smoke-hub.html
          grep -qF '<title>Anthemic Developments</title>' /tmp/anthemic-smoke-hub.html \
            || { echo "Hub page missing expected <title>"; exit 1; }
          # Bass routing is nginx (anthemic-ops). Hub only guarantees files under /var/www/anthemic-hub/bass/.
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'test -f /var/www/anthemic-hub/bass/index.html && test -f /var/www/anthemic-hub/bass/brand_assets/AndyPBass.png' \
            || { echo "bass/ not on disk under /var/www/anthemic-hub/bass/ (apply script / rsync includes)"; exit 1; }
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'grep -qF "guitarPhoto" /var/www/anthemic-hub/bass/index.html' \
            || { echo "bass/index.html on droplet missing expected PapaWeb marker"; exit 1; }
