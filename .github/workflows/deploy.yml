name: Deploy

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-anthemic-hub
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate economics static assets
        run: node scripts/check-economics.js

      - name: Write bass/papaweb.config.js (Slack webhook from secret)
        env:
          PAPAWEB_SLACK_WEBHOOK: ${{ secrets.PAPAWEB_SLACK_WEBHOOK }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const url = (process.env.PAPAWEB_SLACK_WEBHOOK || '').trim();
          const o = {};
          if (url) o.CONTACT_SLACK_WEBHOOK_URL = url;
          const body =
            '/* Generated in CI — do not edit on the droplet (redeploy overwrites). */\n' +
            'globalThis.PAPAWEB_CONTACT_SECRETS = ' +
            JSON.stringify(o) +
            ';\n';
          fs.writeFileSync('bass/papaweb.config.js', body);
          NODE

      - name: Write economics FRED API key (server-side proxy only)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const key = (process.env.FRED_API_KEY || '').trim();
          if (key) {
            fs.writeFileSync('economics/.fred-api-key', key + '\n', { mode: 0o600 });
          } else {
            try { fs.unlinkSync('economics/.fred-api-key'); } catch {}
          }
          NODE

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload to Droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          RSYNC_SSH="ssh -p ${DEPLOY_PORT}"
          DEST="${DEPLOY_USER}@${DEPLOY_HOST}:incoming-hub/"
          # One rsync per tree: avoids multi-source quirks; trailing slash on ./bass/ copies directory contents into incoming-hub/bass/.
          rsync -avz -e "${RSYNC_SSH}" ./index.html "${DEST}"
          rsync -avz -e "${RSYNC_SSH}" ./bass/ "${DEST}bass/"
          rsync -avz -e "${RSYNC_SSH}" ./brain/ "${DEST}brain/"
          rsync -avz -e "${RSYNC_SSH}" ./gigs/ "${DEST}gigs/"
          rsync -avz -e "${RSYNC_SSH}" ./anth-dev-ad/ "${DEST}anth-dev-ad/"
          rsync -avz -e "${RSYNC_SSH}" ./personal/ "${DEST}personal/"
          rsync -avz -e "${RSYNC_SSH}" ./economics/ "${DEST}economics/"
          mkdir -p ./incoming-mmd-staging/mmd
          cp ./scripts/valuation_fetch.py ./scripts/valuation_server.py ./incoming-mmd-staging/mmd/
          cp ./scripts/droplet/mmd-valuation.service ./incoming-mmd-staging/mmd/
          rsync -avz -e "${RSYNC_SSH}" ./incoming-mmd-staging/mmd/ "${DEST}mmd/"
          rm -rf ./incoming-mmd-staging
          rsync -avz -e "${RSYNC_SSH}" ./content/ "${DEST}content/"
          if [[ -d assets ]]; then
            rsync -avz -e "${RSYNC_SSH}" ./assets/ "${DEST}assets/"
          fi
          # Always ship the latest apply script so the droplet cannot drift.
          rsync -avz -e "${RSYNC_SSH}" ./scripts/droplet/anthemic-hub-deploy-apply.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/home/${DEPLOY_USER}/incoming-hub/anthemic-hub-deploy-apply.sh"

      - name: Validate upload contents on Droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          HUB_IN="/home/${DEPLOY_USER}/incoming-hub"
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "test -f ${HUB_IN}/index.html && test -f ${HUB_IN}/bass/index.html && test -f ${HUB_IN}/brain/index.html && test -f ${HUB_IN}/gigs/index.html && test -f ${HUB_IN}/gigs/gigs.json && test -f ${HUB_IN}/content/hub.json && test -f ${HUB_IN}/content/reading-list.seed.json && test -f ${HUB_IN}/personal/index.html && test -f ${HUB_IN}/personal/writing/index.html && test -f ${HUB_IN}/personal/writing/quill-ink.svg && test -f ${HUB_IN}/economics/index.html && test -f ${HUB_IN}/mmd/valuation_server.py && test -f ${HUB_IN}/mmd/valuation_fetch.py" \
            || { echo "incoming-hub missing hub, bass, brain, gigs, content, reading-list.seed, or personal/ files after upload (expected under ${HUB_IN})"; exit 1; }

      - name: Apply on Droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          HUB_IN="/home/${DEPLOY_USER}/incoming-hub"
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "printf '%s\\n' '${HUB_IN}' > /tmp/anthemic-hub-incoming.path && chmod 644 /tmp/anthemic-hub-incoming.path && sudo /usr/local/bin/anthemic-hub-deploy-apply.sh"

      - name: Smoke test (hub + bass files on droplet)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          HUB_IN="/home/${DEPLOY_USER}/incoming-hub"
          code_root=$(curl -sS -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 2 "https://anthemic-developments.com/")
          [[ "${code_root}" == "200" ]] || { echo "Hub / returned HTTP ${code_root}"; exit 1; }
          curl -sS --retry 3 --retry-delay 2 "https://anthemic-developments.com/" -o /tmp/anthemic-smoke-hub.html
          grep -qF 'Anthemic Developments</title>' /tmp/anthemic-smoke-hub.html \
            || { echo "Hub page missing expected site name in <title>"; exit 1; }
          # Bass routing is nginx (anthemic-ops). Hub only guarantees files under /var/www/anthemic-hub/bass/.
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'test -f /var/www/anthemic-hub/bass/index.html' \
            || { echo "bass/index.html missing under /var/www/anthemic-hub/bass/ (reinstall apply script from repo; check incoming-hub/bass/ after upload)"; exit 1; }
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'grep -qF "Andy Pap — Bass" /var/www/anthemic-hub/bass/index.html' \
            || { echo "bass/index.html on droplet missing expected content marker"; exit 1; }
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'test -f /var/www/anthemic-hub/personal/writing/index.html' \
            || { echo "After apply, writing index missing (incoming: ${HUB_IN}). Install latest scripts/droplet/anthemic-hub-deploy-apply.sh to /usr/local/bin/ (uses /tmp/anthemic-hub-incoming.path)."; exit 1; }
          code_writing=$(curl -sS -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 2 "https://anthemic-developments.com/personal/writing/")
          [[ "${code_writing}" == "200" ]] || { echo "Writing holding page /personal/writing/ returned HTTP ${code_writing} (sync anthemic-ops nginx to droplet; verify sites-enabled -> sites-available/anthemic-hub)"; exit 1; }
          curl -sS --retry 3 --retry-delay 2 "https://anthemic-developments.com/personal/writing/" -o /tmp/anthemic-smoke-writing.html
          grep -qF 'Writing — coming soon' /tmp/anthemic-smoke-writing.html \
            || { echo "Writing page missing expected <title> marker"; exit 1; }
